# -- App name (required, used for all resource names, labels, selectors)
name: ""

# -- Container image
image:
  registry: registry.mysite.com
  repository: ""  # defaults to .name
  tag: latest
  pullSecrets: true  # set false for public images (postgres, redis)

# -- Replicas
replicas: 1

# -- Container port
port: 80

# -- Service
service:
  port: 80
  targetPort: ""  # defaults to .port

# -- Ingress
ingress:
  enabled: true
  hosts:
    - ""  # e.g. my-app.mysite.com
  annotations: {}

# -- Probes
probes:
  type: http  # http | exec
  path: /
  execCommand: []  # e.g. ["pg_isready", "-U", "postgres"]
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  # Polls quickly while booting so a ready pod is detected fast, instead of
  # waiting a full readiness periodSeconds (keeps deploys snappy). The app gets
  # startupPeriodSeconds * startupFailureThreshold to start (2s * 30 = 60s).
  startup: true
  startupPeriodSeconds: 2
  startupFailureThreshold: 30

# -- Grace period for the old pod to shut down on a deploy. Lower (e.g. 10) for
# apps that handle SIGTERM quickly; with Recreate the new pod waits for the old
# one to exit, so a long period slows deploys. Keep 30 if the app must flush.
terminationGracePeriodSeconds: 30

# -- Resources
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# -- Deployment strategy
strategy: RollingUpdate  # or Recreate

# -- Override container command and args
command: []
args: []

# -- Environment variables
env: []
# - name: NODE_ENV
#   value: production
# - name: DATABASE_URL
#   valueFrom:
#     secretKeyRef:
#       name: my-app-secrets
#       key: database-url

# -- Pod annotations (e.g. prometheus scraping)
podAnnotations: {}

# -- Persistence (stateful apps)
persistence:
  enabled: false
  size: 1Gi
  mountPath: /data

# -- Node scheduling
nodeSelector: {}
tolerations: []
