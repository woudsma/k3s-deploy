# -- App name (required, used for all resource names, labels, selectors)
name: ""

# -- Container image
image:
  registry: registry.mysite.com
  repository: ""  # defaults to .name
  tag: latest
  pullSecrets: true  # set false for public images (postgres, redis)

# -- Replicas
replicas: 1

# -- Container port
port: 80

# -- Service
service:
  port: 80
  targetPort: ""  # defaults to .port

# -- Ingress
ingress:
  enabled: true
  hosts:
    - ""  # e.g. my-app.mysite.com
  annotations: {}

# -- Probes
probes:
  type: http  # http | exec
  path: /
  execCommand: []  # e.g. ["pg_isready", "-U", "postgres"]
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3
  # Startup probe: polls quickly while the app is booting so a ready pod is
  # detected within ~startupPeriodSeconds instead of waiting a full readiness
  # periodSeconds. This is what keeps deploys fast — without it, a long
  # readiness periodSeconds delays the rollout by up to that many seconds.
  # The app gets startupPeriodSeconds * startupFailureThreshold to come up
  # (default 2s * 30 = 60s) before being considered failed.
  startup: true
  startupPeriodSeconds: 2
  startupFailureThreshold: 30

# -- How long to wait for the old pod to shut down gracefully on a deploy.
# Lower this (e.g. 10) for apps that handle SIGTERM quickly; with the Recreate
# strategy the new pod can't start until the old one is gone, so a long grace
# period directly slows deploys. Leave at 30 for apps that need time to flush.
terminationGracePeriodSeconds: 30

# -- Resources
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# -- Deployment strategy
strategy: RollingUpdate  # or Recreate

# -- Override container command and args
command: []
args: []

# -- Environment variables
env: []
# - name: NODE_ENV
#   value: production
# - name: DATABASE_URL
#   valueFrom:
#     secretKeyRef:
#       name: my-app-secrets
#       key: database-url

# -- Pod annotations (e.g. prometheus scraping)
podAnnotations: {}

# -- Persistence (stateful apps)
persistence:
  enabled: false
  size: 1Gi
  mountPath: /data

# -- Node scheduling
nodeSelector: {}
tolerations: []
