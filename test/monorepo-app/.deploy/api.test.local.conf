# Per-app deploy config for the `api.test.local` push target.
# Exercises every knob the pre-receive hook understands.

# Build the Dockerfile under a subdirectory, not the repo root.
BUILD_CONTEXT="apps/api"
DOCKERFILE="Dockerfile"

# Helm values live outside the repo root too.
HELM_VALUES=".deploy/helm/api.yaml"

# Baked into the image and asserted on the served page.
BUILD_ARGS="APP_LABEL=MONOREPO-BUILD-ARG-OK"

# Only pushes to this ref are accepted (guards prod against stray branches).
ALLOWED_REF="refs/heads/main"
